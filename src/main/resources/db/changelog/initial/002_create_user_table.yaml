databaseChangeLog:
  - changeSet:
      id: 002_create_users_table
      author: Erjan
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_users_role_id
                    references: role(id)
              - column:
                  name: enabled
                  type: boolean