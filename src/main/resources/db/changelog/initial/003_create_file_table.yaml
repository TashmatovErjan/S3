databaseChangeLog:
  - changeSet:
      id: 003_create_file_table
      author: Erjan
      changes:
        - createTable:
            tableName: file
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR
              - column:
                  name: original_name
                  type: VARCHAR
              - column:
                  name: size
                  type: BIGINT
              - column:
                  name: creation_date
                  type: TIMESTAMP
              - column:
                  name: file_type
                  type: VARCHAR
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_file_author_id
                    references: users(id)
