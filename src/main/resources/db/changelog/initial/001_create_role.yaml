databaseChangeLog:
    - changeSet:
          id: 001_role_table
          author: Erjan
          changes:
              - createTable:
                    tableName: roles
                    columns:
                        - column:
                              name: id
                              type: BIGINT
                              autoIncrement: true
                              constraints:
                                  primaryKey: true
                                  nullable: false
                        - column:
                              name: name
                              type: VARCHAR(45)
